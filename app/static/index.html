<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trust Desk — Databricks × Virtue Foundation</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel2: #1c2330;
    --border: #262d36;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #ff5f46;
    --good: #3fb950;
    --warn: #d29922;
    --bad: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }
  header {
    padding: 14px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  }
  header h1 { font-size: 18px; font-weight: 650; }
  header .sub { color: var(--muted); font-size: 12.5px; }
  header #stats { margin-left: auto; color: var(--muted); font-size: 12.5px; }
  main { display: flex; gap: 0; height: calc(100vh - 53px); }

  /* left: controls + ranked list */
  #left { flex: 0 0 46%; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  #controls { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .chip {
    padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--panel); color: var(--text); font-size: 13px; cursor: pointer;
  }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  select {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 10px; font-size: 13px; min-width: 220px;
  }
  #list { overflow-y: auto; flex: 1; }
  .frow {
    padding: 12px 20px; border-bottom: 1px solid var(--border); cursor: pointer;
    display: grid; grid-template-columns: 1fr auto; gap: 4px 12px; align-items: center;
  }
  .frow:hover, .frow.sel { background: var(--panel); }
  .frow .name { font-weight: 600; font-size: 14px; }
  .frow .loc { color: var(--muted); font-size: 12.5px; }
  .score-badge {
    grid-row: span 2; font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums;
    padding: 8px 12px; border-radius: 10px; text-align: center; min-width: 62px;
  }
  .score-hi { background: rgba(63,185,80,.12); color: var(--good); }
  .score-mid { background: rgba(210,153,34,.12); color: var(--warn); }
  .score-lo { background: rgba(248,81,73,.12); color: var(--bad); }
  .sig { display: flex; gap: 6px; grid-column: 1; flex-wrap: wrap; }
  .tag {
    font-size: 11px; padding: 2px 8px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--muted);
  }
  .tag.on { color: var(--good); border-color: rgba(63,185,80,.4); }
  .tag.err { color: var(--bad); border-color: rgba(248,81,73,.4); }
  .tag.claim { color: var(--warn); border-color: rgba(210,153,34,.4); }

  /* right: detail */
  #detail { flex: 1; overflow-y: auto; padding: 24px 28px; }
  #detail .placeholder { color: var(--muted); margin-top: 80px; text-align: center; font-size: 14px; }
  #detail h2 { font-size: 20px; margin-bottom: 2px; }
  #detail .loc { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .facts { display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 18px; }
  .fact { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; }
  .fact .k { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
  .fact .v { font-size: 15px; font-weight: 600; margin-top: 2px; }
  section { margin-bottom: 20px; }
  section h3 {
    font-size: 12px; text-transform: uppercase; letter-spacing: .06em;
    color: var(--muted); margin-bottom: 8px;
  }
  .cite {
    background: var(--panel); border: 1px solid var(--border); border-left: 3px solid var(--accent);
    border-radius: 8px; padding: 9px 12px; font-size: 13.5px; margin-bottom: 6px; line-height: 1.45;
  }
  .cite .src { color: var(--muted); font-size: 11px; text-transform: uppercase; margin-right: 8px; }
  .cite.corr { border-left-color: var(--good); }
  mark { background: rgba(255,95,70,.25); color: inherit; border-radius: 3px; padding: 0 2px; }
  .empty-note { color: var(--warn); font-size: 13px; }
  .desc { color: var(--text); font-size: 13.5px; line-height: 1.55; background: var(--panel);
    border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; max-height: 180px; overflow-y: auto; }

  /* override form */
  #override { background: var(--panel2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  #override .btns { display: flex; gap: 8px; margin-bottom: 10px; }
  .obtn {
    padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--panel); color: var(--text); font-size: 13px; cursor: pointer;
  }
  .obtn.active-confirm { background: rgba(63,185,80,.15); border-color: var(--good); color: var(--good); }
  .obtn.active-dispute { background: rgba(248,81,73,.15); border-color: var(--bad); color: var(--bad); }
  .obtn.active-flag { background: rgba(210,153,34,.15); border-color: var(--warn); color: var(--warn); }
  #override textarea, #override input {
    width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; font-size: 13px; font-family: inherit; margin-bottom: 8px;
  }
  #override textarea { min-height: 60px; resize: vertical; }
  #override .row { display: flex; gap: 8px; }
  #override button.save {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  #override .status { color: var(--muted); font-size: 12.5px; align-self: center; }
  .past-override {
    display: flex; gap: 10px; align-items: baseline; font-size: 13px;
    padding: 7px 0; border-bottom: 1px solid var(--border);
  }
  .past-override .when { color: var(--muted); font-size: 11.5px; margin-left: auto; }
  .v-confirm { color: var(--good); font-weight: 600; }
  .v-dispute { color: var(--bad); font-weight: 600; }
  .v-flag { color: var(--warn); font-weight: 600; }
  #loading { padding: 20px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
  <header>
    <h1>Trust Desk</h1>
    <span class="sub">Can this facility do what it claims? · Databricks × Virtue Foundation</span>
    <a href="/map.html" style="color:var(--accent);font-size:13px;text-decoration:none">Crisis Map →</a>
    <span id="stats"></span>
  </header>
  <main>
    <div id="left">
      <div id="controls">
        <div class="chips" id="capChips"></div>
        <select id="stateSel"><option value="">All states</option></select>
      </div>
      <div id="list"><div id="loading">Pick a capability to rank facilities.</div></div>
    </div>
    <div id="detail"><div class="placeholder">Select a facility to inspect the evidence behind its claims.</div></div>
  </main>
<script>
const CAPS = ["icu","nicu","emergency","maternity","oncology","trauma","dialysis","surgery"];
const CAP_LABELS = {icu:"ICU", nicu:"NICU", emergency:"Emergency", maternity:"Maternity",
  oncology:"Oncology", trauma:"Trauma", dialysis:"Dialysis", surgery:"Surgery"};
let curCap = null, curState = "", curFacility = null, curVerdict = null;

const $ = id => document.getElementById(id);
const esc = s => (s ?? "").toString().replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function highlight(text, patterns) {
  // patterns are server-provided regexes (may contain \b word boundaries)
  let out = esc(text);
  for (const p of patterns) {
    try { out = out.replace(new RegExp("(" + p + ")", "gi"), "<mark>$1</mark>"); }
    catch (e) { /* skip bad pattern */ }
  }
  return out;
}

// ---- init ----
fetch("/api/stats").then(r => r.json()).then(d => {
  if (d.facilities) $("stats").textContent =
    `${d.facilities.toLocaleString()} facilities · ${(d.facilities - d.geo_valid)} with invalid coordinates`;
});
fetch("/api/states").then(r => r.json()).then(rows => {
  if (!Array.isArray(rows)) return;
  for (const r of rows) {
    const o = document.createElement("option");
    o.value = r.state; o.textContent = `${r.state} (${r.n})`;
    $("stateSel").appendChild(o);
  }
});
$("stateSel").onchange = () => { curState = $("stateSel").value; if (curCap) loadList(); };

for (const c of CAPS) {
  const b = document.createElement("button");
  b.className = "chip"; b.textContent = CAP_LABELS[c]; b.dataset.cap = c;
  b.onclick = () => {
    curCap = c;
    document.querySelectorAll(".chip").forEach(x => x.classList.toggle("active", x.dataset.cap === c));
    loadList();
  };
  $("capChips").appendChild(b);
}

// deep link from the map: /?f=<facility_id>&cap=<capability>
const qp = new URLSearchParams(location.search);
if (qp.get("cap") && CAPS.includes(qp.get("cap"))) {
  curCap = qp.get("cap");
  document.querySelectorAll(".chip").forEach(x => x.classList.toggle("active", x.dataset.cap === curCap));
  loadList();
  if (qp.get("f")) loadDetail(qp.get("f"));
}

// ---- ranked list ----
function scoreClass(s) { return s >= 60 ? "score-hi" : s >= 35 ? "score-mid" : "score-lo"; }

function loadList() {
  $("list").innerHTML = `<div id="loading">Ranking ${CAP_LABELS[curCap]} facilities…</div>`;
  const q = new URLSearchParams({capability: curCap});
  if (curState) q.set("state", curState);
  fetch("/api/facilities?" + q).then(r => r.json()).then(rows => {
    if (!Array.isArray(rows)) { $("list").innerHTML = `<div id="loading">Error: ${esc(rows.error)}</div>`; return; }
    if (!rows.length) { $("list").innerHTML = `<div id="loading">No facilities claim ${CAP_LABELS[curCap]} here.</div>`; return; }
    $("list").innerHTML = "";
    for (const r of rows) {
      const div = document.createElement("div");
      div.className = "frow"; div.dataset.id = r.unique_id;
      const corr = r.corroborations;
      const corrTag = corr === 0
        ? `<span class="tag claim">claim only — uncorroborated</span>`
        : `<span class="tag on">${corr}/3 fields corroborate</span>`;
      const geoTag = r.geo_valid ? "" : `<span class="tag err">bad coordinates</span>`;
      const penTag = r.penalty > 0 ? `<span class="tag err">−${r.penalty} suspicious data</span>` : "";
      div.innerHTML = `
        <div class="name">${esc(r.name)}</div>
        <div class="score-badge ${scoreClass(r.trust_score)}" title="${esc(r.tier)}">${r.trust_score}</div>
        <div class="loc">${esc(r.city || "—")}, ${esc(r.state || "—")} · ${esc(r.tier)}</div>
        <div class="sig">${corrTag}${geoTag}${penTag}</div>`;
      div.onclick = () => {
        document.querySelectorAll(".frow").forEach(x => x.classList.remove("sel"));
        div.classList.add("sel");
        loadDetail(r.unique_id);
      };
      $("list").appendChild(div);
    }
  });
}

// ---- detail + citations ----
function citeBlock(title, items, kws, corr) {
  if (!items || !items.length) return "";
  const cls = corr ? "cite corr" : "cite";
  return `<section><h3>${title}</h3>` + items.map(c =>
    `<div class="${cls}">${highlight(c, kws)}</div>`).join("") + "</section>";
}

function loadDetail(id) {
  curFacility = id;
  $("detail").innerHTML = `<div class="placeholder">Loading evidence…</div>`;
  Promise.all([
    fetch(`/api/facility/${encodeURIComponent(id)}?capability=${curCap}`).then(r => r.json()),
    fetch(`/api/overrides?facility_id=${encodeURIComponent(id)}`).then(r => r.json()),
  ]).then(([f, ovs]) => {
    if (f.error) { $("detail").innerHTML = `<div class="placeholder">${esc(f.error)}</div>`; return; }
    const kws = f.matched_keywords || [];
    const c = f.citations || {};
    const corrFields = ["equipment", "procedure", "description"].filter(k => (c[k] || []).length);
    const claimCites = citeBlock(`Capability claims (${CAP_LABELS[curCap]})`, c.capability, kws, false);
    const corrHtml = corrFields.map(k =>
      citeBlock(`Corroborating ${k}`, c[k], kws, true)).join("");
    const noCorr = corrFields.length === 0
      ? `<section><span class="empty-note">⚠ No independent corroboration found in equipment, procedures, or description. This is a bare claim.</span></section>` : "";
    const breakdown = `
      <section><h3>Trust score breakdown — ${f.trust_score} · ${esc(f.tier)}</h3>
        <div class="facts">
          <div class="fact"><div class="k">Corroboration /40</div><div class="v">${f.corr_score}</div></div>
          <div class="fact"><div class="k">Completeness /20</div><div class="v">${f.completeness_score}</div></div>
          <div class="fact"><div class="k">Web presence /25</div><div class="v">${f.web_score}</div></div>
          <div class="fact"><div class="k">Geo validity /15</div><div class="v">${f.geo_score}${f.geo_in_india ? "" : " ⚠"}</div></div>
          ${f.penalty > 0 ? `<div class="fact"><div class="k">Penalties</div><div class="v" style="color:var(--bad)">−${f.penalty}</div></div>` : ""}
        </div></section>`;
    $("detail").innerHTML = `
      <h2>${esc(f.name)}</h2>
      <div class="loc">${esc(f.address_line1 || "")} ${esc(f.address_city || "")}, ${esc(f.address_stateOrRegion || "")} ${esc(f.address_zipOrPostcode ?? "")}</div>
      ${breakdown}
      <div class="facts">
        <div class="fact"><div class="k">Doctors</div><div class="v">${esc(f.numberDoctors ?? "—")}</div></div>
        <div class="fact"><div class="k">Beds</div><div class="v">${esc(f.capacity ?? "—")}</div></div>
        <div class="fact"><div class="k">Est.</div><div class="v">${esc(f.yearEstablished ?? "—")}</div></div>
        <div class="fact"><div class="k">Website</div><div class="v">${esc(f.officialWebsite || "—")}</div></div>
        <div class="fact"><div class="k">Coordinates</div><div class="v">${f.latitude != null ? f.latitude.toFixed(2) + ", " + f.longitude.toFixed(2) : "—"}${f.geo_in_india ? "" : " · outside India ⚠"}</div></div>
      </div>
      ${claimCites}${corrHtml}${noCorr}
      <section><h3>AI evidence audit</h3>
        <button class="obtn" id="verifyBtn">🔍 Verify ${CAP_LABELS[curCap]} claim with AI</button>
        <div id="verifyOut"></div>
      </section>
      <section><h3>Full description</h3><div class="desc">${highlight(f.description || "—", kws)}</div></section>
      <section><h3>Your assessment (persists across sessions)</h3>
        <div id="override">
          <div class="btns">
            <button class="obtn" data-v="confirm">✓ Confirm capability</button>
            <button class="obtn" data-v="dispute">✗ Dispute</button>
            <button class="obtn" data-v="flag">⚑ Flag for review</button>
          </div>
          <textarea id="ovNote" placeholder="Why? e.g. 'Called facility — ICU confirmed, 4 ventilators' "></textarea>
          <div class="row">
            <input id="ovAuthor" placeholder="Your name" style="max-width:180px">
            <button class="save" id="ovSave">Save</button>
            <span class="status" id="ovStatus"></span>
          </div>
        </div>
        <div id="pastOverrides"></div>
      </section>`;
    document.querySelectorAll(".obtn").forEach(b => b.onclick = () => {
      curVerdict = b.dataset.v;
      document.querySelectorAll(".obtn").forEach(x =>
        x.className = "obtn" + (x === b ? " active-" + curVerdict : ""));
    });
    $("ovSave").onclick = saveOverride;
    $("verifyBtn").onclick = runVerify;
    renderOverrides(ovs);
  });
}

const VERDICT_COLOR = {corroborated: "var(--good)", plausible: "var(--warn)",
  unsupported: "var(--warn)", contradicted: "var(--bad)"};

function runVerify() {
  $("verifyBtn").disabled = true;
  $("verifyOut").innerHTML = `<div id="loading">Claude is auditing the evidence… (~10s, then cached)</div>`;
  fetch("/api/verify", {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({facility_id: curFacility, capability: curCap}),
  }).then(r => r.json()).then(v => {
    $("verifyBtn").disabled = false;
    if (v.error) { $("verifyOut").innerHTML = `<div class="empty-note">Error: ${esc(v.error)}</div>`; return; }
    const col = VERDICT_COLOR[v.verdict] || "var(--muted)";
    $("verifyOut").innerHTML = `
      <div class="cite" style="border-left-color:${col}">
        <b style="color:${col};text-transform:uppercase">${esc(v.verdict)}</b>
        · confidence ${(v.confidence * 100).toFixed(0)}%
        ${v.cached ? '· <span class="tag">cached</span>' : ""}
        <div style="margin-top:6px">${esc(v.summary)}</div>
      </div>
      ${(v.evidence || []).map(e => `
        <div class="cite ${e.supports ? "corr" : ""}" ${e.supports ? "" : 'style="border-left-color:var(--bad)"'}>
          <span class="src">${esc(e.field)} ${e.supports ? "· supports" : "· against"}</span>“${esc(e.quote)}”
        </div>`).join("")}
      ${(v.consistency_checks || []).map(c => `
        <div style="font-size:13px;padding:3px 0">
          ${c.passed ? "✅" : "❌"} ${esc(c.rule)} <span style="color:var(--muted)">— ${esc(c.note)}</span>
        </div>`).join("")}
      <div style="color:var(--muted);font-size:11.5px;margin-top:6px">
        Reasoning traced in MLflow · ${(v.reasoning_steps || []).length} steps · Databricks FM API</div>`;
  }).catch(e => {
    $("verifyBtn").disabled = false;
    $("verifyOut").innerHTML = `<div class="empty-note">Request failed: ${esc(String(e))}</div>`;
  });
}

function renderOverrides(ovs) {
  if (!Array.isArray(ovs) || !ovs.length) { $("pastOverrides").innerHTML = ""; return; }
  $("pastOverrides").innerHTML = ovs.map(o => `
    <div class="past-override">
      <span class="v-${esc(o.verdict)}">${esc(o.verdict)}</span>
      <span>${esc(o.note || "")}</span>
      <span class="when">${esc(o.author || "anon")} · ${new Date(o.created_at).toLocaleString()}</span>
    </div>`).join("");
}

function saveOverride() {
  if (!curVerdict) { $("ovStatus").textContent = "Pick a verdict first."; return; }
  $("ovStatus").textContent = "Saving…";
  fetch("/api/overrides", {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      facility_id: curFacility, verdict: curVerdict, capability: curCap,
      note: $("ovNote").value || null, author: $("ovAuthor").value || null,
    }),
  }).then(r => r.json()).then(d => {
    if (d.error) { $("ovStatus").textContent = "Error: " + d.error; return; }
    $("ovStatus").textContent = "Saved ✓ (stored in Lakebase)";
    fetch(`/api/overrides?facility_id=${encodeURIComponent(curFacility)}`)
      .then(r => r.json()).then(renderOverrides);
  });
}
</script>
</body>
</html>
