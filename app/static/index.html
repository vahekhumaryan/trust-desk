<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trust Desk — Databricks × Virtue Foundation</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #262d36;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #ff5f46; /* databricks-ish coral */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    width: 100%;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  header h1 { font-size: 20px; font-weight: 650; letter-spacing: -0.01em; }
  header span { color: var(--muted); font-size: 13px; }
  main {
    width: 100%;
    max-width: 820px;
    padding: 48px 24px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 24px;
  }
  .card .label {
    color: var(--muted);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }
  .card .value {
    font-size: 42px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .card .sub { color: var(--muted); font-size: 13px; margin-top: 8px; }
  #status { color: var(--muted); font-size: 13px; margin-top: 24px; }
  #status.error { color: #f85149; }
  .accent { color: var(--accent); }
</style>
</head>
<body>
  <header>
    <h1>Trust Desk</h1>
    <span>Databricks × Virtue Foundation</span>
  </header>
  <main>
    <div class="cards">
      <div class="card">
        <div class="label">Healthcare facilities</div>
        <div class="value" id="facilities">—</div>
        <div class="sub">Virtue Foundation dataset</div>
      </div>
      <div class="card">
        <div class="label">Geo-validated <span class="accent">•</span></div>
        <div class="value" id="geo">—</div>
        <div class="sub">Coordinates within expected bounds</div>
      </div>
    </div>
    <div id="status">Loading stats…</div>
  </main>
<script>
  const fmt = n => n.toLocaleString("en-US");
  fetch("/api/stats")
    .then(r => r.json().then(d => ({ ok: r.ok, d })))
    .then(({ ok, d }) => {
      const status = document.getElementById("status");
      if (!ok || d.error) {
        status.textContent = "Failed to load stats: " + (d.error || "unknown error");
        status.classList.add("error");
        return;
      }
      document.getElementById("facilities").textContent = fmt(d.facilities);
      document.getElementById("geo").textContent = fmt(d.geo_valid);
      status.textContent = "Live from Databricks SQL" + (d.cached ? " (cached)" : "");
    })
    .catch(e => {
      const status = document.getElementById("status");
      status.textContent = "Request failed: " + e;
      status.classList.add("error");
    });
</script>
</body>
</html>
